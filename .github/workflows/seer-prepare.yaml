name: "Prepare Release"

on:
  workflow_call:
    outputs:
      checkout_ref:
        description: "SHA to checkout for building"
        value: ${{ jobs.prepare.outputs.checkout_ref }}
      release_tag:
        description: "Tag created for this release, empty if tag already existed"
        value: ${{ jobs.prepare.outputs.release_tag }}

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.prepare.outputs.checkout_ref }}
      release_tag: ${{ steps.prepare.outputs.release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and create tag if needed
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)
          TAG="v${VERSION}"

          echo "event=${GITHUB_EVENT_NAME}"
          echo "head_sha=${GITHUB_SHA}"
          echo "candidate_tag=${TAG}"

          git fetch --tags --force
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; skipping release."
            echo "checkout_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

          echo "Created and pushed ${TAG}"
          echo "checkout_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
