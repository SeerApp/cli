name: Build seer Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  workflow_run:
    workflows: ["Tag from Cargo version"]
    types: [completed]

permissions:
  contents: write

jobs:
  resolve_release_ref:
    name: Resolve release ref
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve checkout ref and tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            echo "checkout_ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --tags --force
          VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)
          TAG="v${VERSION}"
          TAG_SHA="$(git rev-list -n 1 "$TAG" 2>/dev/null || true)"

          # Only release on workflow_run if the expected version tag points to this exact commit.
          if [ -z "$TAG_SHA" ] || [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "checkout_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "checkout_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"

  dist_seer:
    name: Build seer Distributions
    needs: resolve_release_ref
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 (native)
          - os: ubuntu-22.04
            platform: linux
            target: x86_64-unknown-linux-gnu
            architecture: amd64

          # macOS x64
          - os: macos-latest
            platform: darwin
            target: x86_64-apple-darwin
            architecture: amd64

          # macOS arm64
          - os: macos-latest
            platform: darwin
            target: aarch64-apple-darwin
            architecture: arm64

          # Windows x64
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
            architecture: amd64

    steps:
      # Windows LF fix
      - name: Configure git to use LF (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_release_ref.outputs.checkout_ref }}

      # Setup SSH for private dependencies
      - name: Setup SSH for private dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Force Cargo to use the git CLI instead, which can use the agent properly.
      - name: Configure Cargo to use git CLI (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Configure Buf registry token
        shell: bash
        run: echo "CARGO_REGISTRIES_BUF_TOKEN=${{ secrets.BUF_REGISTRY_TOKEN }}" >> $GITHUB_ENV

      # Rust toolchain
      - name: Install Rust toolchain
        run: rustup toolchain install 1.86.0 --profile minimal --target ${{ matrix.target }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      # Rust version hash (cache key)
      - name: Get Rust version (unix)
        if: matrix.os != 'windows-latest'
        run: echo "RUST_VERSION_HASH=$(rustc --version | shasum -a 256 | awk '{print $1}')" >> $GITHUB_ENV

      - name: Get Rust version (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: echo "RUST_VERSION_HASH=$(rustc --version | sha256sum | awk '{print $1}')" >> $GITHUB_ENV

      # Cargo cache
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/
            ./target/${{ matrix.target }}/release/
          key: ${{ runner.os }}-rust-${{ env.RUST_VERSION_HASH }}-cargo-${{ hashFiles('./Cargo.lock') }}

      # macOS ARM cross-compile vars
      - name: Configure macos-arm64 cross compile
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          echo "SDKROOT=$(xcrun -sdk macosx --show-sdk-path)" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=$(xcrun -sdk macosx --show-sdk-platform-version)" >> $GITHUB_ENV

      # OpenSSL macOS
      - name: Configure OpenSSL (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install openssl@1.1 || true
          echo "OPENSSL_DIR=$(brew --prefix openssl@1.1)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@1.1)/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@1.1)/lib" >> $GITHUB_ENV

      # LLVM macOS
      - name: Install LLVM (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install llvm || true
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
          echo "LLVM_CONFIG_PATH=$(brew --prefix llvm)/bin/llvm-config" >> $GITHUB_ENV

      # Linux deps (x64 only, not arm64)
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm-dev \
            libclang-dev \
            pkg-config \
            libudev-dev

      # Artifact name
      - name: Configure artifact names
        shell: bash
        run: |
          echo "SHORT_TARGET_NAME=${{ matrix.platform }}-${{ matrix.architecture }}" >> $GITHUB_ENV

      # Build

      # Linux x64 — native cargo
      - name: Build - Cargo (Linux x64)
        if: matrix.os == 'ubuntu-22.04' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --locked --target ${{ matrix.target }}

      # macOS
      - name: Build - Cargo (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Windows
      - name: Build - Cargo (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --release --locked --target ${{ matrix.target }}

      #Archive and upload artifacts

      - name: Compress artifact (not windows)
        if: matrix.os != 'windows-latest'
        run: tar -C target/${{ matrix.target }}/release -zcvf seer-${{ env.SHORT_TARGET_NAME }}.tar.gz seer

      - name: Compress artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: tar -czf seer-${{ env.SHORT_TARGET_NAME }}.tar.gz -C target/${{ matrix.target }}/release seer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seer-${{ env.SHORT_TARGET_NAME }}
          path: seer-${{ env.SHORT_TARGET_NAME }}.tar.gz

  publish_release:
    name: Publish GitHub Release
    needs: [resolve_release_ref, dist_seer]
    runs-on: ubuntu-latest
    if: needs.resolve_release_ref.outputs.release_tag != ''
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          cp release-artifacts/**/seer-*.tar.gz release-files/
          ls -lah release-files

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_release_ref.outputs.release_tag }}
          name: ${{ needs.resolve_release_ref.outputs.release_tag }}
          generate_release_notes: true
          files: release-files/seer-*.tar.gz
