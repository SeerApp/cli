name: Build seer Binaries

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      draft:
        description: 'Save as draft release (uncheck to publish immediately)'
        type: boolean
        default: true
      severity:
        description: 'Update severity level'
        type: choice
        default: minor
        options:
          - minor
          - major
          - critical

permissions:
  contents: write

jobs:
  prepare:
    uses: ./.github/workflows/seer-prepare.yaml
    secrets: inherit

  build:
    needs: prepare
    if: needs.prepare.outputs.release_tag != ''
    uses: ./.github/workflows/seer-build.yaml
    with:
      checkout_ref: ${{ needs.prepare.outputs.checkout_ref }}
    secrets: inherit

  publish:
    needs: [prepare, build]
    if: needs.prepare.outputs.release_tag != ''
    uses: ./.github/workflows/seer-publish.yaml
    with:
      release_tag: ${{ needs.prepare.outputs.release_tag }}
      severity: ${{ github.event.inputs.severity || 'minor' }}
      draft: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.draft == 'true' }}
    secrets: inherit
